<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Profiles</title>
    <style>
        /* Loading Overlay Style */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Spinner Animation */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
            font-size: 18px;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column; /* இதுதான் தலைப்பை மேலே கொண்டு வரும் */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- NEW TITLE STYLE --- */
        .system-title {
            font-size: 42px;
            color: #2c3e50;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .search-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            background-color: #fff;
            cursor: pointer;
        }

        .search-btn {
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .search-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Finding best matches for you...</div>
    </div>

    <div class="system-title">Fashion Design Recommender System</div>

    <div class="search-card">
        <h2 style="color: #555; margin-bottom: 20px; font-size: 20px;">Search for Profiles</h2>
        
        <form action="/view_profiles" method="GET" onsubmit="showLoading()">
            
            <div class="form-group">
                <label>I am looking for:</label>
                <select name="gender_filter" required>
                    <option value="">Select Gender</option>
                    <option value="Men">Men</option>
                    <option value="Women">Women</option>
                </select>
            </div>

            <div class="form-group">
                <label>Age Category:</label>
                <select name="search">
                    <option value="">All Ages</option>
                    <option value="18-24">18-24</option>
                    <option value="25-34">25-34</option>
                    <option value="35-44">35-44</option>
                    <option value="45+">45+</option>
                </select>
            </div>

            <div class="form-group">
                <label>Body Type:</label>
                <select name="body_type_filter">
                    <option value="">Any Body Type</option>
                    <option value="Athletic">Athletic</option>
                    <option value="Rectangular">Rectangular</option>
                    <option value="Curvy">Curvy</option>
                    <option value="Tall">Tall</option>
                </select>
            </div>

            <button type="submit" class="search-btn">Search Profiles</button>
        </form>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
        }
    </script>

</body>
</html>
